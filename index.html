<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Middle East Report | International Research & Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Source+Serif+4:wght@300;400;600&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0c0f;
    --bg-secondary: #111318;
    --bg-card: #161920;
    --bg-elevated: #1d2029;
    --accent-gold: #c9a84c;
    --accent-gold-light: #e2c57a;
    --accent-red: #c0392b;
    --accent-blue: #2980b9;
    --accent-teal: #1abc9c;
    --text-primary: #e8e6e1;
    --text-secondary: #9fa3ad;
    --text-muted: #5a6070;
    --border-color: #242830;
    --border-accent: #2e3340;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'Source Serif 4', Georgia, serif;
    --font-ui: 'IBM Plex Sans', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; font-size: 16px; }

  body {
    background-color: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--font-body);
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* \u2500\u2500\u2500 SCROLLBAR \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-primary); }
  ::-webkit-scrollbar-thumb { background: var(--accent-gold); border-radius: 3px; }

  /* \u2500\u2500\u2500 HEADER / NAV \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  #top-bar {
    background: #050709;
    border-bottom: 1px solid var(--border-color);
    padding: 6px 0;
    font-family: var(--font-ui);
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  #top-bar .inner {
    max-width: 1300px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #top-bar .date-tag { color: var(--accent-gold); font-weight: 500; }
  #top-bar .ticker {
    display: flex;
    gap: 28px;
    overflow: hidden;
  }
  #top-bar .ticker span { white-space: nowrap; }

  header {
    background: var(--bg-secondary);
    border-bottom: 3px solid var(--accent-gold);
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 4px 30px rgba(0,0,0,0.6);
  }
  .header-inner {
    max-width: 1300px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 72px;
  }
  .site-brand {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .brand-title {
    font-family: var(--font-display);
    font-size: 1.55rem;
    font-weight: 900;
    color: var(--text-primary);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .brand-title span { color: var(--accent-gold); }
  .brand-subtitle {
    font-family: var(--font-ui);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  nav { display: flex; align-items: center; gap: 4px; }
  nav a {
    font-family: var(--font-ui);
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-secondary);
    text-decoration: none;
    padding: 6px 12px;
    border-radius: 4px;
    transition: color 0.2s, background 0.2s;
  }
  nav a:hover { color: var(--accent-gold); background: rgba(201,168,76,0.08); }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 8px;
  }
  .hamburger span {
    width: 24px;
    height: 2px;
    background: var(--text-primary);
    display: block;
    transition: 0.3s;
  }

  /* \u2500\u2500\u2500 HERO \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  #hero {
    position: relative;
    height: 92vh;
    min-height: 580px;
    display: flex;
    align-items: flex-end;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute;
    inset: 0;
    background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/7/74/Jerusalem_skyline_from_the_Mount_of_Olives_in_2019.jpg/1280px-Jerusalem_skyline_from_the_Mount_of_Olives_in_2019.jpg');
    background-size: cover;
    background-position: center 40%;
    filter: brightness(0.38) saturate(0.7);
    transform: scale(1.03);
    transition: transform 8s ease;
  }
  #hero:hover .hero-bg { transform: scale(1.0); }
  .hero-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(10,12,15,0.98) 0%, rgba(10,12,15,0.5) 45%, transparent 100%);
  }
  .hero-content {
    position: relative;
    z-index: 2;
    max-width: 1300px;
    margin: 0 auto;
    padding: 0 24px 72px;
    width: 100%;
  }
  .hero-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-ui);
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent-gold);
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.3);
    padding: 5px 14px;
    border-radius: 2px;
    margin-bottom: 20px;
  }
  .hero-tag::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--accent-gold);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }
  .hero-headline {
    font-family: var(--font-display);
    font-size: clamp(2.4rem, 6vw, 5rem);
    font-weight: 900;
    line-height: 1.06;
    letter-spacing: -0.025em;
    color: var(--text-primary);
    max-width: 820px;
    margin-bottom: 20px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }
  .hero-headline em { color: var(--accent-gold); font-style: normal; }
  .hero-sub {
    font-family: var(--font-body);
    font-size: 1.15rem;
    color: var(--text-secondary);
    max-width: 620px;
    line-height: 1.65;
    margin-bottom: 32px;
  }
  .hero-meta {
    display: flex;
    align-items: center;
    gap: 20px;
    font-family: var(--font-ui);
    font-size: 0.78rem;
    color: var(--text-muted);
  }
  .hero-meta .divider { color: var(--border-accent); }
  .hero-scroll {
    position: absolute;
    right: 40px;
    bottom: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: var(--text-muted);
    font-family: var(--font-ui);
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    z-index: 2;
    cursor: pointer;
  }
  .hero-scroll .arrow {
    width: 1px;
    height: 48px;
    background: linear-gradient(to bottom, var(--accent-gold), transparent);
    animation: scrollDown 2s ease infinite;
  }
  @keyframes scrollDown {
    0% { transform: scaleY(0); transform-origin: top; }
    50% { transform: scaleY(1); transform-origin: top; }
    51% { transform-origin: bottom; }
    100% { transform: scaleY(0); transform-origin: bottom; }
  }

  /* \u2500\u2500\u2500 BREAKING BAND \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  .breaking-band {
    background: var(--accent-red);
    padding: 10px 0;
    overflow: hidden;
  }
  .breaking-inner {
    max-width: 1300px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .breaking-label {
    font-family: var(--font-ui);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #fff;
    background: rgba(0,0,0,0.25);
    padding: 3px 10px;
    border-radius: 2px;
    white-space: nowrap;
  }
  .breaking-text {
    font-family: var(--font-ui);
    font-size: 0.85rem;
    color: rgba(255,255,255,0.92);
    white-space: nowrap;
    animation: marquee 28s linear infinite;
  }
  @keyframes marquee {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  /* \u2500\u2500\u2500 LAYOUT CONTAINERS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  .section-wrap {
    max-width: 1300px;
    margin: 0 auto;
    padding: 80px 24px;
  }
  .section-label {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-ui);
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent-gold);
    margin-bottom: 12px;
  }
  .section-label::before {
    content: '';
    width: 28px;
    height: 2px;
    background: var(--accent-gold);
  }
  .section-title {
    font-family: var(--font-display);
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 700;
    line-height: 1.12;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    margin-bottom: 16px;
  }
  .section-desc {
    font-family: var(--font-body);
    font-size: 1.05rem;
    color: var(--text-secondary);
    max-width: 680px;
    margin-bottom: 52px;
    line-height: 1.7;
  }
  .divider-line {
    width: 100%;
    height: 1px;
    background: var(--border-color);
    margin: 64px 0;
  }

  /* \u2500\u2500\u2500 ARTICLE GRID \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  .article-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 40px;
    align-items: start;
  }
  .article-body h2 {
    font-family: var(--font-display);
    font-size: 1.7rem;
    font-weight: 700;
    color: var(--text-primary);
    margin: 36px 0 14px;
    letter-spacing: -0.015em;
    line-height: 1.2;
  }
  .article-body h3 {
    font-family: var(--font-display);
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--accent-gold-light);
    margin: 28px 0 12px;
    letter-spacing: -0.01em;
  }
  .article-body p {
    font-size: 1.05rem;
    line-height: 1.85;
    color: var(--text-secondary);
    margin-bottom: 20px;
  }
  .article-body p strong { color: var(--text-primary); font-weight: 600; }
  .article-body blockquote {
    border-left: 3px solid var(--accent-gold);
    margin: 32px 0;
    padding: 16px 24px;
    background: var(--bg-card);
    border-radius: 0 8px 8px 0;
  }
  .article-body blockquote p {
    font-size: 1.15rem;
    font-style: italic;
    color: var(--text-primary);
    margin: 0;
  }
  .article-body blockquote cite {
    font-family: var(--font-ui);
    font-size: 0.78rem;
    color: var(--accent-gold);
    letter-spacing: 0.06em;
    margin-top: 8px;
    display: block;
    font-style: normal;
  }

  /* sidebar */
  .article-sidebar { display: flex; flex-direction: column; gap: 24px; }
  .sidebar-card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    overflow: hidden;
  }
  .sidebar-card .card-label {
    font-family: var(--font-ui);
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent-gold);
    background: rgba(201,168,76,0.08);
    padding: 10px 16px;
    border-bottom: 1px solid var(--border-color);
  }
  .sidebar-card .card-body { padding: 16px; }
  .sidebar-card .card-body p {
    font-size: 0.9rem;
    line-height: 1.65;
    color: var(--text-secondary);
    margin-bottom: 10px;
  }
  .sidebar-card .card-body p:last-child { margin-bottom: 0; }
  .key-fact {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border-color);
  }
  .key-fact:last-child { border-bottom: none; padding-bottom: 0; }
  .key-fact .dot {
    width: 6px;
    height: 6px;
    background: var(--accent-gold);
    border-radius: 50%;
    margin-top: 7px;
    flex-shrink: 0;
  }
  .key-fact span { font-size: 0.88rem; color: var(--text-secondary); line-height: 1.55; }

  /* \u2500\u2500\u2500 HISTORICAL SECTION \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  #history { background: var(--bg-secondary); }
  .history-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    margin-top: 48px;
  }
  .history-card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 10px;
    padding: 28px;
    transition: border-color 0.3s, transform 0.3s;
  }
  .history-card:hover {
    border-color: var(--accent-gold);
    transform: translateY(-4px);
  }
  .history-card .era {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    color: var(--accent-gold);
    margin-bottom: 10px;
  }
  .history-card h3 {
    font-family: var(--font-display);
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 12px;
    line-height: 1.25;
  }
  .history-card p {
    font-size: 0.9rem;
    color: var(--text-secondary);
    line-height: 1.7;
  }

  /* \u2500\u2500\u2500 TIMELINE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  #timeline { background: var(--bg-primary); }
  .timeline {
    position: relative;
    margin-top: 56px;
    padding-left: 0;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 110px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: linear-gradient(to bottom, var(--accent-gold), transparent);
  }
  .tl-item {
    display: flex;
    align-items: flex-start;
    gap: 0;
    margin-bottom: 48px;
    position: relative;
  }
  .tl-year {
    font-family: var(--font-mono);
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--accent-gold);
    width: 90px;
    flex-shrink: 0;
    padding-top: 4px;
    text-align: right;
  }
  .tl-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent-gold);
    border: 3px solid var(--bg-primary);
    margin: 4px 28px 0;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    box-shadow: 0 0 0 4px rgba(201,168,76,0.15);
  }
  .tl-content {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 10px;
    padding: 22px 26px;
    flex: 1;
    transition: border-color 0.3s;
  }
  .tl-content:hover { border-color: rgba(201,168,76,0.4); }
  .tl-content h3 {
    font-family: var(--font-display);
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 8px;
  }
  .tl-content p {
    font-size: 0.92rem;
    color: var(--text-secondary);
    line-height: 1.7;
    margin: 0;
  }
  .tl-tag {
    display: inline-block;
    font-family: var(--font-ui);
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #fff;
    padding: 2px 8px;
    border-radius: 3px;
    margin-bottom: 8px;
  }
  .tag-diplomacy { background: var(--accent-blue); }
  .tag-conflict { background: var(--accent-red); }
  .tag-declaration { background: #7d3c98; }
  .tag-agreement { background: var(--accent-teal); }
  .tag-war { background: #e67e22; }

  /* \u2500\u2500\u2500 PERSPECTIVE SECTION \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  #perspective { background: var(--bg-secondary); }
  .perspective-lead {
    font-family: var(--font-display);
    font-size: 1.35rem;
    font-style: italic;
    color: var(--text-primary);
    line-height: 1.55;
    padding: 28px;
    background: var(--bg-card);
    border-left: 4px solid var(--accent-gold);
    border-radius: 0 10px 10px 0;
    margin-bottom: 40px;
  }
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
  }
  .two-col p {
    font-size: 1rem;
    line-height: 1.85;
    color: var(--text-secondary);
    margin-bottom: 18px;
  }
  .two-col p strong { color: var(--text-primary); }
  .argument-card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 10px;
    padding: 22px;
    margin-top: 24px;
  }
  .argument-card h4 {
    font-family: var(--font-ui);
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent-gold);
    margin-bottom: 10px;
  }
  .argument-card p {
    font-size: 0.9rem;
    color: var(--text-secondary);
    line-height: 1.7;
    margin: 0;
  }

  /* \u2500\u2500\u2500 SECURITY SECTION \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  #security { background: var(--bg-primary); }
  .security-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 32px;
    margin-top: 48px;
  }
  .security-block {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 10px;
    padding: 30px;
    transition: border-color 0.3s;
  }
  .security-block:hover { border-color: rgba(201,168,76,0.35); }
  .security-block .icon {
    font-size: 1.8rem;
    margin-bottom: 14px;
  }
  .security-block h3 {
    font-family: var(--font-display);
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 12px;
  }
  .security-block p {
    font-size: 0.92rem;
    color: var(--text-secondary);
    line-height: 1.75;
  }
